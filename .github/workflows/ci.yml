name: CI

on:
    pull_request:
    push:
        branches:
            - main

jobs:
    test-and-build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install uv
              uses: astral-sh/setup-uv@v4

            - name: Sync dependencies
              run: uv sync --frozen --all-groups

            - name: Run tests
              run: uv run pytest -q

            - name: Build package
              run: uv build

            - name: Upload dist artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist
                  path: dist/*
